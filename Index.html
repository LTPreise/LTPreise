<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT Preise</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0A84FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LT Preise">
</head>

<body>

<div class="container">

<h1>🚚 LT Preise</h1>

<label>Beladene Kilometer</label>
<input type="number" id="beladen">

<label>Leerkilometer</label>
<input type="number" id="leer">

<label>Zusätzliche Kilometer</label>
<input type="number" id="extra">

<label>Maut (€)</label>
<input type="number" id="maut" value="0">

<label>Preis je Kilometer (€)</label>
<input type="number" id="kmPreis" value="1.40" step="0.01">

<button onclick="berechnen()">Preis berechnen</button>

<div class="ergebnis">

<p>Gesamtkilometer</p>
<h2 id="gesamtKm">0 km</h2>

<p>Festpreis netto</p>
<h1 id="preis">0,00 €</h1>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
